---
apiVersion: v1
kind: Namespace
metadata:
  name: genai
  labels:
    app.kubernetes.io/managed-by: argocd
    environment: poc
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/managed-by: argocd
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rag-api-sa
  namespace: genai
  annotations:
    azure.workload.identity/client-id: "REPLACE_WITH_RAG_CLIENT_ID"
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rag-api-role
  namespace: genai
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rag-api-rolebinding
  namespace: genai
subjects:
  - kind: ServiceAccount
    name: rag-api-sa
    namespace: genai
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: rag-api-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-server-reader
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "namespaces", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-server-reader-binding
subjects:
  - kind: ServiceAccount
    name: mcp-server-sa
    namespace: genai
roleRef:
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
  name: mcp-server-reader
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: genai-secrets
  namespace: genai
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "REPLACE_WITH_RAG_CLIENT_ID"
    keyvaultName: "REPLACE_WITH_KV_NAME"
    tenantId: "REPLACE_WITH_TENANT_ID"
    objects: |
      array:
        - |
          objectName: qdrant-api-key
          objectType: secret
        - |
          objectName: azure-openai-api-key
          objectType: secret
  secretObjects:
    - secretName: genai-secrets
      type: Opaque
      data:
        - objectName: qdrant-api-key
          key: qdrant-api-key
        - objectName: azure-openai-api-key
          key: azure-openai-api-key
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: genai
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rag-api-egress
  namespace: genai
spec:
  podSelector:
    matchLabels:
      app: rag-api
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: ollama
      ports:
        - protocol: TCP
          port: 11434
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: genai
spec:
  podSelector:
    matchLabels:
      app: rag-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8000
