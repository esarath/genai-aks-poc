# =============================================================================
# ArgoCD Application - GenAI RAG Pipeline
# GitOps Repo: https://github.com/esarath/genai-aks-gitops
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: genai-poc
  namespace: argocd
  labels:
    project: genai-llm-poc
spec:
  description: GenAI LLM Pipeline POC Project
  sourceRepos:
    - 'https://github.com/esarath/genai-aks-gitops'
    - 'https://charts.helm.sh/stable'
  destinations:
    - namespace: genai-rag
      server: https://kubernetes.default.svc
    - namespace: genai-llm
      server: https://kubernetes.default.svc
    - namespace: genai-observe
      server: https://kubernetes.default.svc
    - namespace: vault
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: 'rbac.authorization.k8s.io'
      kind: ClusterRole
    - group: 'rbac.authorization.k8s.io'
      kind: ClusterRoleBinding
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  roles:
    - name: developer
      policies:
        - p, proj:genai-poc:developer, applications, get, genai-poc/*, allow
        - p, proj:genai-poc:developer, applications, sync, genai-poc/*, allow

---
# RAG API Application
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rag-api
  namespace: argocd
  labels:
    app: rag-api
    component: ai-pipeline
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: genai-poc
  source:
    repoURL: https://github.com/esarath/genai-aks-gitops
    targetRevision: main
    path: apps/rag-api
    helm:
      releaseName: rag-api
      valueFiles:
        - values.yaml
        - values-poc.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: genai-rag
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas

---
# Qdrant Vector DB Application
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qdrant-vector-db
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: genai-poc
  source:
    repoURL: https://qdrant.github.io/qdrant-helm
    chart: qdrant
    targetRevision: "0.9.1"
    helm:
      releaseName: qdrant
      values: |
        replicaCount: 1
        persistence:
          enabled: true
          size: 10Gi
          storageClass: default
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        tolerations:
          - key: "workload"
            operator: "Equal"
            value: "ai"
            effect: "NoSchedule"
        nodeSelector:
          workload: ai-mlops
        service:
          type: ClusterIP
          port: 6333
        config:
          collection:
            vectors:
              size: 384
              distance: Cosine
  destination:
    server: https://kubernetes.default.svc
    namespace: genai-rag
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# LLM Gateway (LiteLLM) Application
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llm-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: genai-poc
  source:
    repoURL: https://github.com/esarath/genai-aks-gitops
    targetRevision: main
    path: apps/llm-gateway
    helm:
      releaseName: llm-gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: genai-llm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# MCP Server Application
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: genai-poc
  source:
    repoURL: https://github.com/esarath/genai-aks-gitops
    targetRevision: main
    path: apps/mcp-server
    helm:
      releaseName: mcp-server
  destination:
    server: https://kubernetes.default.svc
    namespace: genai-rag
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# Observability Stack
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: genai-poc
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "58.2.2"
    helm:
      releaseName: kube-prometheus-stack
      values: |
        grafana:
          enabled: true
          adminPassword: "genai-poc-grafana"
          service:
            type: ClusterIP
          persistence:
            enabled: true
            size: 5Gi
          dashboardProviders:
            dashboardproviders.yaml:
              providers:
                - name: 'genai'
                  folder: 'GenAI'
                  type: file
                  options:
                    path: /var/lib/grafana/dashboards/genai
        prometheus:
          prometheusSpec:
            retention: 7d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  resources:
                    requests:
                      storage: 10Gi
        alertmanager:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: genai-observe
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
