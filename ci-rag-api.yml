# =============================================================================
# GitHub Actions: CI/CD Pipeline for GenAI RAG API
# Repo: https://github.com/esarath/genai-aks-poc
# DockerHub: esarathmails
# =============================================================================

name: GenAI RAG API - CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/rag-api/**'
      - 'src/embedding-service/**'
      - '.github/workflows/ci-rag-api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/rag-api/**'

env:
  DOCKERHUB_USERNAME: esarathmails
  IMAGE_NAME: esarathmails/rag-api
  GITOPS_REPO: esarath/genai-aks-gitops
  PYTHON_VERSION: "3.11"

jobs:
  # ─────────────────────────────────────────────────────
  # JOB 1: Lint & Unit Tests
  # ─────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/rag-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff mypy

      - name: Lint with Ruff
        run: ruff check . --output-format=github

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short \
            --junitxml=test-results/junit.xml
        env:
          QDRANT_URL: http://localhost:6333
          LLM_BASE_URL: http://localhost:11434

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: src/rag-api/test-results/

  # ─────────────────────────────────────────────────────
  # JOB 2: Security Scan
  # ─────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'src/rag-api'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Dependency audit
        run: |
          pip install pip-audit
          pip-audit -r src/rag-api/requirements.txt

  # ─────────────────────────────────────────────────────
  # JOB 3: Build & Push Docker Image
  # ─────────────────────────────────────────────────────
  build-push:
    name: Build & Push to DockerHub
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: src/rag-api
          file: src/rag-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Scan pushed image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

  # ─────────────────────────────────────────────────────
  # JOB 4: Update GitOps Repo (ArgoCD)
  # ─────────────────────────────────────────────────────
  gitops-update:
    name: Update GitOps Manifest
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update image tag in Helm values
        run: |
          cd gitops
          IMAGE_TAG="${{ needs.build-push.outputs.image_tag }}"
          
          # Update rag-api image tag
          sed -i "s|tag: .*|tag: ${IMAGE_TAG}|g" \
            apps/rag-api/values.yaml
          
          # Add deployment metadata
          yq -i ".deployment.lastUpdated = \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"" \
            apps/rag-api/values.yaml
          yq -i ".deployment.gitSha = \"${{ github.sha }}\"" \
            apps/rag-api/values.yaml

      - name: Commit and push changes
        run: |
          cd gitops
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "ci: update rag-api to ${{ needs.build-push.outputs.image_tag }}

          Triggered by: ${{ github.actor }}
          Commit: ${{ github.sha }}
          Build: ${{ github.run_id }}"
          git push

      - name: Notify Slack (optional)
        if: success()
        run: |
          echo "Deployment triggered for rag-api:${{ needs.build-push.outputs.image_tag }}"
          # curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
          #   -H 'Content-type: application/json' \
          #   -d '{"text":"✅ rag-api deployed: ${{ needs.build-push.outputs.image_tag }}"}'

  # ─────────────────────────────────────────────────────
  # JOB 5: Integration Tests (Post-Deploy)
  # ─────────────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: gitops-update
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for ArgoCD sync
        run: sleep 60

      - name: Run integration tests
        run: |
          pip install httpx pytest pytest-asyncio
          pytest tests/integration/ -v \
            --base-url=${{ secrets.AKS_RAG_API_URL }} \
            --tb=short
        env:
          API_KEY: ${{ secrets.RAG_API_KEY }}
